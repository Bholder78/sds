name: Update SDS register

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sds-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # skip the commit the bot itself makes, to avoid a loop
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OCR engine and Python libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q tesseract-ocr
          pip install --quiet pypdf pymupdf pytesseract pillow

      - name: Rebuild SDS register from PDFs
        run: python scripts/build_index.py

      - name: Commit updated register
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto-update SDS register"
          git push
